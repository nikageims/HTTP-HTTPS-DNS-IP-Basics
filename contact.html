<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>კონტაქტი</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>კონტაქტი</h1>
  <p>დამიკავშირდით</p>
</header>

<section class="info">
  <h2>საკონტაქტო ინფორმაცია</h2>
  <p>ელ. ფოსტა: salami@example.com</p>
  <p>ტელეფონი: +995 123 456 789</p>
  <p>LinkedIn: linkedin.com/in/salami</p>
</section>

<section class="info">
  <h2>შეტყობინების გაგზავნა</h2>
  <form>
    <label for="name">სახელი:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">ელ. ფოსტა:</label>
    <input type="email" id="email" name="email" required>

    <label for="message">შეტყობინება:</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit" class="btn">გაგზავნა</button>
  </form>
</section>

<a href="index.html" class="back">⬅ უკან მთავარზე</a>

<footer>
  <p>© 2025 სალამის პორტფოლიო</p>
</footer>

</body>
</html>
